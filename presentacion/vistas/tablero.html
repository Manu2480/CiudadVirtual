<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciudad Virtual — Tablero</title>

    <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-bold-rounded/css/uicons-bold-rounded.css">
    <link rel="stylesheet" href="../estilos/tableroBase.css">
    <link rel="stylesheet" href="../estilos/ranking.css">
    <link rel="stylesheet" href="../estilos/estilosBase/ruta.css">
    <script src="../../negocio/vista.js"></script>

    <script src="../../modelos/Edificio.js"             defer></script>
    <script src="../../modelos/EdificioResidencial.js"  defer></script>
    <script src="../../modelos/EdificioComercial.js"    defer></script>
    <script src="../../modelos/EdificioIndustrial.js"   defer></script>
    <script src="../../modelos/EdificioServicio.js"     defer></script>
    <script src="../../modelos/PlantaUtilidad.js"       defer></script>
    <script src="../../modelos/Via.js"                  defer></script>
    <script src="../../modelos/Casa.js"                 defer></script>
    <script src="../../modelos/Apartamento.js"          defer></script>
    <script src="../../modelos/Tienda.js"               defer></script>
    <script src="../../modelos/CentroComercial.js"      defer></script>
    <script src="../../modelos/Fabrica.js"              defer></script>
    <script src="../../modelos/Granja.js"               defer></script>
    <script src="../../modelos/Hospital.js"             defer></script>
    <script src="../../modelos/EstacionBombero.js"      defer></script>
    <script src="../../modelos/EstacionPolicia.js"      defer></script>
    <script src="../../modelos/Parque.js"               defer></script>
    <script src="../../modelos/PlantaElectrica.js"      defer></script>
    <script src="../../modelos/PlantaHidraulica.js"     defer></script>
    <script src="../../modelos/Ciudadano.js"            defer></script>
    <script src="../../modelos/Terreno.js"              defer></script>
    <script src="../../modelos/Ciudad.js"               defer></script>

    <script src="../../acceso_datos/CiudadStorage.js"   defer></script>
    <script src="../../acceso_datos/RankingStorage.js"  defer></script>
    <script src="../../acceso_datos/ApiClima.js"        defer></script>
    <script src="../../acceso_datos/ApiNoticias.js"     defer></script>

    <script src="../../negocio/tableroGeneral/edificios.js"      defer></script>
    <script src="../../negocio/tableroGeneral/notificaciones.js" defer></script>
    <script src="../../negocio/tableroGeneral/recursos.js"       defer></script>
    <script src="../../negocio/tableroGeneral/edificaciones.js"  defer></script>
    <script src="../../negocio/tableroGeneral/mapa.js"           defer></script>
    <script src="../../negocio/tableroGeneral/modal.js"          defer></script>
    <script src="../../negocio/tableroGeneral/puntuacion.js"     defer></script>
    <script src="../../negocio/tableroGeneral/ranking.js"        defer></script>
    <script src="../../negocio/tableroGeneral/tablero.js"        defer></script>
    <script src="../../negocio/tableroGeneral/menuPartida.js"    defer></script>
    <script src="../../negocio/tableroGeneral/ruta.js"            defer></script>

</head>

<body>

    <div id="zona-notificaciones" class="zona-notificaciones" aria-live="polite"></div>

    <header id="encabezado" class="encabezado">

        <a href="index.html" class="encabezado__logo">
            <img src="../../media/inicio/logo.png" alt="Ciudad Virtual">
        </a>

        <h1 id="nombre-ciudad" class="encabezado__titulo">Mi Ciudad</h1>

        <div id="panel-recursos" class="panel-recursos"></div>

        <!-- Solo visible en móvil (tableroMovil.css) -->
        <button id="btn-recursos-movil" class="btn-recursos-movil" aria-label="Ver recursos">
            <i class="fi fi-br-menu-burger"></i>
        </button>

        <!-- Botón noticias — visible en todas las vistas -->
        <button id="btn-noticias" class="btn-noticias" aria-label="Ver noticias">
            <i class="fi fi-br-rss"></i>
        </button>

        <!-- Botón ruta (desktop) -->
        <button id="btn-ruta" class="btn-ruta" aria-label="Calcular ruta entre dos edificios">
            <i class="fi fi-br-route"></i>
        </button>

        <!-- Solo visible en móvil: controles de turnos -->
        <button id="btn-turnos-movil" class="btn-turnos-movil" aria-label="Opciones de turnos">
            <i class="fi fi-br-time-check"></i>
        </button>

        <div id="menu-turnos-movil" class="menu-turnos-movil" aria-hidden="true">
            <div class="menu-turnos-movil__seccion">
                <label class="menu-turnos-movil__label" for="input-turnos-movil-duracion">Duración turno (segundos)</label>
                <div class="menu-turnos-movil__input-group">
                    <input id="input-turnos-movil-duracion" type="number" min="1" step="1" value="30" />
                    <button id="btn-turnos-movil-aplicar" class="menu-turnos-movil__opcion">Aplicar</button>
                </div>
            </div>
            <button class="menu-turnos-movil__opcion" id="btn-turnos-movil-pausar">
                <i class="fi fi-br-pause"></i> Pausar turno
            </button>
            <button class="menu-turnos-movil__opcion" id="btn-turnos-movil-reanudar">
                <i class="fi fi-br-play"></i> Reanudar turno
            </button>
        </div>

        <!-- Menú opciones de partida -->
        <button id="btn-menu-partida" class="btn-menu-partida" aria-label="Opciones de partida">
            <i class="fi fi-br-menu-dots-vertical"></i>
        </button>

        <div id="menu-partida" class="menu-partida" aria-hidden="true">
            <button class="menu-partida__opcion" id="btn-guardar-local">
                <i class="fi fi-br-floppy-disk"></i> Guardar en dispositivo
            </button>
            <button class="menu-partida__opcion" id="btn-exportar-json">
                <i class="fi fi-br-download"></i> Exportar como JSON
            </button>
            <div class="menu-partida__seccion">
                <label class="menu-partida__label" for="input-duracion-turno">Duración turno (segundos)</label>
                <div class="menu-partida__input-group">
                    <input id="input-duracion-turno" type="number" min="1" step="1" value="30" />
                    <button id="btn-aplicar-duracion-turno" class="menu-partida__opcion">Aplicar</button>
                </div>
            </div>
            <button class="menu-partida__opcion" id="btn-ver-ranking">
                <i class="fi fi-br-trophy"></i> Ver Ranking
            </button>
        </div>

    </header>

    <main id="contenedor-juego" class="contenedor-juego">

        <aside id="sidebar-izquierdo" class="sidebar sidebar--izquierdo">
            <section id="panel-recursos-side" class="panel panel--recursos">
                <div class="modulo-header">
                    <h2 class="panel__titulo">Recursos</h2>
                </div>
            </section>
            <section id="menu-construccion" class="panel panel--construccion">
                <div class="modulo-header">
                    <h2 class="panel__titulo">Construir</h2>
                </div>
            </section>
        </aside>

        <section id="area-mapa" class="area-mapa">
            <div id="controles-zoom" class="controles-zoom">
                <button id="btn-zoom-in"  class="btn-zoom" aria-label="Acercar"><i class="fi fi-br-zoom-in"></i></button>
                <button id="btn-zoom-out" class="btn-zoom" aria-label="Alejar"><i class="fi fi-br-zoom-out"></i></button>
            </div>
            <div id="mapa-grid" class="mapa-grid" role="grid"></div>
        </section>

        <aside id="sidebar-derecho" class="sidebar sidebar--derecho">
            <section id="widget-clima" class="panel panel--clima">
                <h2 class="panel__titulo">Clima</h2>
            </section>
            <section id="panel-noticias" class="panel panel--noticias">
                <h2 class="panel__titulo">Noticias</h2>
            </section>
            <section id="panel-estadisticas" class="panel panel--estadisticas">
                <div class="modulo-header">
                    <h2 class="panel__titulo">Estadísticas</h2>
                </div>
            </section>
        </aside>

    </main>

    <nav id="tabs-movil" class="tabs-movil" aria-label="Menú principal">
        <button class="tab tab--activo" data-panel="area-mapa"><i class="fi fi-br-map"></i> Mapa</button>
        <button class="tab" data-panel="menu-construccion"><i class="fi fi-br-hammer"></i> Construir</button>
        <button class="tab" data-panel="panel-recursos"><i class="fi fi-br-wheat"></i> Recursos</button>
        <button class="tab" data-panel="ruta"><i class="fi fi-br-route"></i> Ruta</button>
    </nav>

    <button id="btn-stats-flotante" class="btn-flotante" aria-label="Ver estadísticas">
        <i class="fi fi-br-chart-histogram"></i>
    </button>

    <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-hidden="true">
        <div id="modal-contenido" class="modal-contenido">
            <button id="modal-cerrar" class="modal-cerrar" aria-label="Cerrar"><i class="fi fi-br-cross-small"></i></button>
            <div id="modal-cuerpo" class="modal-cuerpo"></div>
        </div>
    </div>

</body>
</html>
