<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargar ciudad</title>
    <link rel="stylesheet" href="../estilos/cargar.css">
    <!-- Lógica de carga de archivo y animación de revelado -->
    <script src="../../negocio/cargar.js" defer></script>
    <!--Lógica necesaria para la carga de txt-->
    <script src="../../negocio/tableroGeneral/edificios.js" defer></script>
    <script src="../../negocio/tableroGeneral/edificaciones.js" defer></script>
    <script src="../../acceso_datos/CiudadStorage.js" defer></script>
    <script src="../../acceso_datos/SessionStorage.js" defer></script>
</head>
<body class="gris">

    <!-- Barra superior con logo: al hacer click regresa a la pantalla de inicio -->
    <div class="encabezado">
        <a href="index.html">
            <img src="../../media/inicio/logo.png">
        </a>
    </div>

    <div class="container">

        <!-- Contenedor de dos capas superpuestas:
            - Capa inferior (.constructionImg):     imagen a color, siempre visible
            - Capa superior (.constructionImgGris): imagen en gris, se recorta
            de abajo hacia arriba al cargar el JSON, revelando el color debajo -->
        <div class="imgWrapper">
            <img class="constructionImg"
                src="../../media/inicio/construccion.png"
                alt="Ciudad">
        </div>

        <!-- Input de archivo oculto: se activa programáticamente desde el botón -->
        <input type="file" class="file" id="jsonInput" accept=".json">
        <input type="file" class="file" id="txtInput" accept=".txt">

        <!-- Barra de navegación con botones de dirección y botón principal -->
        <div class="navContainer">

            <!-- Flecha izquierda (navegación futura) -->
            <button id="izquierda" class="navBtn left"></button>

            <!-- Botón principal: abre el explorador de archivos o redirige a la ciudad.
                El JS lo cambia a "Ver ciudad" cuando el JSON es válido. -->
            <button class="cargaBtn 0 activo" id="cargaJSON">Cargar Archivo JSON</button>

            <button class = "cargaBtn 1" id = "cargaTXT" >Cargar Archivo txt</button>

            <!-- Flecha derecha (navegación futura) -->
            <button id="derecha" class="navBtn right"></button>

        </div>
    </div>

</body>
</html>
